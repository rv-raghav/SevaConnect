<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Registration - SevaConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1121d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-10 py-3 sticky top-0 z-50">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-8 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">handshake</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">SevaConnect</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="hidden md:flex items-center gap-9">
<a class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Home</a>
<a class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Services</a>
<a class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">About Us</a>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-primary text-white hover:bg-primary/90 transition-colors text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Login</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex flex-1 justify-center items-center py-10 px-4">
<div class="layout-content-container flex flex-col w-full max-w-[520px] bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Form Header -->
<div class="px-8 pt-8 pb-4 text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">Create your account</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal mt-2">Join SevaConnect to find trusted professionals or grow your business.</p>
</div>
<!-- Role Toggle -->
<div class="flex px-8 pb-6">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 transition-all has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-bold leading-normal">
<span class="truncate mr-2">Customer</span>
<input checked="" class="invisible w-0 absolute" name="role" type="radio" value="Customer"/>
<span class="material-symbols-outlined text-[18px]">person</span>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 transition-all has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-bold leading-normal">
<span class="truncate mr-2">Provider</span>
<input class="invisible w-0 absolute" name="role" type="radio" value="Provider"/>
<span class="material-symbols-outlined text-[18px]">engineering</span>
</label>
</div>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-5 px-8 pb-8">
<!-- Name -->
<div class="flex flex-col gap-1.5">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal" for="full_name">Full Name</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary h-12 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" id="full_name" placeholder="Enter your full name" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">badge</span>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal" for="email">Email Address</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary h-12 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" id="email" placeholder="name@example.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">mail</span>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal" for="password">Password</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary h-12 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" id="password" placeholder="Create a secure password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">lock</span>
</div>
</div>
<!-- City Dropdown -->
<div class="flex flex-col gap-1.5">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal" for="city">City</label>
<div class="relative">
<select class="form-select flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary h-12 placeholder:text-slate-400 px-[15px] text-base font-normal leading-normal appearance-none transition-all cursor-pointer" id="city">
<option disabled="" selected="" value="">Select your city</option>
<option value="new-york">New York</option>
<option value="los-angeles">Los Angeles</option>
<option value="chicago">Chicago</option>
<option value="houston">Houston</option>
<option value="miami">Miami</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">location_on</span>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-4 bg-primary text-white hover:bg-primary/90 transition-all shadow-md shadow-primary/20 text-base font-bold leading-normal tracking-[0.015em]" type="button">
<span class="truncate">Create Account</span>
</button>
<!-- Footer Links -->
<p class="text-center text-slate-500 dark:text-slate-400 text-sm mt-2">
                    Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
<p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-4 px-4">
                    By registering, you agree to our <a class="underline hover:text-slate-600 dark:hover:text-slate-300" href="#">Terms of Service</a> and <a class="underline hover:text-slate-600 dark:hover:text-slate-300" href="#">Privacy Policy</a>.
                </p>
</form>
</div>
</main>
<!-- Footer Illustration (Optional visual element for cleanliness) -->
<div class="hidden lg:block fixed bottom-0 left-0 w-full h-24 bg-gradient-to-t from-slate-200/50 to-transparent dark:from-slate-800/50 pointer-events-none -z-10"></div>
</body></html>
