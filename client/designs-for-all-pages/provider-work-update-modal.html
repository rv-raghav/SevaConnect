<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Provider Work Update Modal - SevaConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1121d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white dark:bg-[#1a1c2e] w-full max-w-[800px] rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden relative">
<!-- Header -->
<div class="flex items-start justify-between p-6 pb-4 border-b border-slate-100 dark:border-slate-800/50">
<div class="flex flex-col gap-1">
<h1 class="text-slate-900 dark:text-white text-2xl font-bold leading-tight">Update Work Status</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Order #SC-8294 • Plumbing Repair</p>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto max-h-[80vh] p-6 space-y-6">
<!-- Context Note -->
<div class="bg-primary/5 dark:bg-primary/10 rounded-lg p-4 flex gap-3 items-start">
<span class="material-symbols-outlined text-primary mt-0.5">info</span>
<p class="text-slate-700 dark:text-slate-300 text-sm leading-relaxed">
                    Adding clear photos helps document your work and ensures faster payment processing. Please include both before and after shots.
                </p>
</div>
<!-- Stage Toggle -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-white text-sm font-bold uppercase tracking-wider">Work Stage</label>
<div class="flex bg-slate-100 dark:bg-slate-800/50 p-1.5 rounded-xl w-fit">
<label class="relative flex cursor-pointer items-center justify-center rounded-lg px-6 py-2.5 transition-all">
<input checked="" class="peer sr-only" name="work_stage" type="radio" value="before"/>
<span class="z-10 text-slate-500 dark:text-slate-400 font-medium peer-checked:text-primary dark:peer-checked:text-white text-sm">Before Work</span>
<div class="absolute inset-0 hidden peer-checked:block bg-white dark:bg-primary rounded-lg shadow-sm border border-slate-200 dark:border-transparent"></div>
</label>
<label class="relative flex cursor-pointer items-center justify-center rounded-lg px-6 py-2.5 transition-all">
<input class="peer sr-only" name="work_stage" type="radio" value="after"/>
<span class="z-10 text-slate-500 dark:text-slate-400 font-medium peer-checked:text-primary dark:peer-checked:text-white text-sm">After Work</span>
<div class="absolute inset-0 hidden peer-checked:block bg-white dark:bg-primary rounded-lg shadow-sm border border-slate-200 dark:border-transparent"></div>
</label>
</div>
</div>
<!-- Notes Input -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-white text-sm font-bold uppercase tracking-wider" for="notes">Technician Notes</label>
<textarea class="w-full min-h-[120px] resize-none rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#23263a] p-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all text-base" id="notes" placeholder="Describe the current status, issues found, or work completed..."></textarea>
</div>
<!-- Photo Upload Area -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-white text-sm font-bold uppercase tracking-wider">Photo Evidence</label>
<!-- Dropzone -->
<div class="group relative flex flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 hover:border-primary dark:hover:border-primary bg-slate-50 dark:bg-[#23263a] px-6 py-10 transition-all cursor-pointer">
<div class="h-12 w-12 rounded-full bg-primary/10 flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary text-2xl">cloud_upload</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-white font-bold text-lg mb-1">Click to upload or drag and drop</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">SVG, PNG, JPG or GIF (max. 10MB)</p>
</div>
<button class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold py-2 px-4 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 text-sm group-hover:text-primary transition-colors">
                        Select Files
                    </button>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" multiple="" type="file"/>
</div>
<!-- Preview Grid -->
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-2">
<!-- Image 1 -->
<div class="relative aspect-square rounded-xl overflow-hidden group">
<div class="absolute inset-0 bg-cover bg-center transition-transform group-hover:scale-105" data-alt="Close up of rusty pipes under a sink" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCgRRBR3lEGjv9E-t0Iyr1dTH-KR2gQdDe3V8UbOXCF9ZRgn960tHu6t0JCwbwUGDuSClXN7zGmR77MIzKLnc7Lv5o1NAkWMEZVbrkcdRgU1zDNpPbX0BuoLvuinwqwdLSgsoQXn50LBbxwYiTc3py-0Hxg4A9aSyW0j96df9FkESQmnqADV28O_Xn0O_iCsa3PJg_Xta85bRxiMEqh2201yh6ITSvAWCDe6kV505uY0NY4SPE6YjMVMsOJIXjLb8wVuSewZp-mGMFH");'>
</div>
<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
<button class="p-1.5 bg-white/20 backdrop-blur-md rounded-full text-white hover:bg-white/40 transition-colors">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
<button class="p-1.5 bg-red-500/80 backdrop-blur-md rounded-full text-white hover:bg-red-600/90 transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
</div>
<!-- Image 2 -->
<div class="relative aspect-square rounded-xl overflow-hidden group">
<div class="absolute inset-0 bg-cover bg-center transition-transform group-hover:scale-105" data-alt="Wrench and tools on bathroom floor tiles" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDLQsN_w6BCGNa4kF_yimaold_6oHGuqJQk9P1YvwJu9F1mZfdYIQE7VvGCIFfux9dsjZYFKiAt9r1wbuYdewluqnX1882k6g4biUjdw7HIxJCZwiBpQgshe8B1QEk-8FcWfKvVQElQxtjXm3h94fuDvQcJk_NLR0xkRIh3Z4vX5XCRjhydTHyoMwfELRrXGMwqRW4E8PTjx6pJc5K6rdAhb9LM_bPQVVHbXxUwbLifPPJkg22IaqAp2XwJFioSuZToPR2pvCSYDF6E");'>
</div>
<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
<button class="p-1.5 bg-white/20 backdrop-blur-md rounded-full text-white hover:bg-white/40 transition-colors">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
<button class="p-1.5 bg-red-500/80 backdrop-blur-md rounded-full text-white hover:bg-red-600/90 transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
</div>
<!-- Uploading State (Example) -->
<div class="relative aspect-square rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center p-4">
<div class="w-full h-1 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden mb-2">
<div class="h-full bg-primary w-2/3 rounded-full"></div>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Uploading...</span>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 border-t border-slate-100 dark:border-slate-800/50 bg-slate-50/50 dark:bg-slate-900/20 flex flex-col-reverse sm:flex-row items-center justify-end gap-3">
<button class="w-full sm:w-auto px-6 py-3 rounded-xl text-slate-600 dark:text-slate-300 font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                Save Draft
            </button>
<button class="w-full sm:w-auto px-8 py-3 rounded-xl bg-primary hover:bg-primary/90 text-white font-bold text-sm shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">send</span>
                Submit Update
            </button>
</div>
</div>
</body></html>
