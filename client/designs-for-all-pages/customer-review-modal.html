<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SevaConnect - Rate Your Experience</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1121d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Image/Pattern for Context -->
<div class="absolute inset-0 z-0">
<img alt="Blurred professional working in a modern interior" class="w-full h-full object-cover opacity-20 dark:opacity-5 filter blur-sm" data-alt="Blurred professional working in a modern interior" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7Xq6tIOQVjYiasCGUEJTiI7Kf25iMvL9ZiP8ywRYN4rtsByNvlou-yOXVMvnLLatOgIe_ARWEFWnCuW3DDClvQLDjjvSSRimKSzQdHdMcS3qI6oogBlZOHr36g32NEo76eb7ELy0Gwi_vJ__A0PrptbEDvB9KOqR7wUTlbJ3ZaMT69fSTWhtliha7DMZGUdtYqi0wAxG84sHr8xhUYtFQCw8VfvDArCoB2UJxK8MJr_zcVavhVd4DMwqnS4E61hutAEYA53WFLzAI"/>
<div class="absolute inset-0 bg-background-light/40 dark:bg-background-dark/80 backdrop-blur-sm"></div>
</div>
<!-- Main Content Wrapper (Modal Overlay Context) -->
<div class="relative z-10 flex flex-1 items-center justify-center p-4 sm:p-6 lg:p-8 h-screen w-full">
<!-- Modal Card -->
<div class="w-full max-w-[520px] bg-white dark:bg-slate-900 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-slate-100 dark:border-slate-800 flex flex-col overflow-hidden">
<!-- Header / Professional Info -->
<div class="relative p-6 pb-2 text-center">
<div class="absolute top-4 right-4">
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<div class="flex flex-col items-center">
<div class="relative mb-4">
<img alt="Portrait of a friendly professional plumber" class="w-20 h-20 rounded-full object-cover border-4 border-background-light dark:border-slate-800 shadow-sm" data-alt="Portrait of a friendly professional plumber" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA15cvHieqty7CZ9-sm-Xn2WBo5ki4UZo46gnukzKHizeh19CDb--cMpF-l9suTxkRvqpHpxV0AX_ArFcJuklg-gYs6VG5JIP7b34QHDskZnbt0oWbA_ikVjS0KAD81MDtYq05nu-AWXfAZR0pyewozc9sVYwHcjcTMadz434b3T6rGyzV0C2D2_Oqp-gwQpu1YiQAeomtVGGc1YNGQctCjIWuqoy2PoNKgQZ9NmCSl9HnHZ26XupGceBDHkcGdMQ9mzaJExjKAgP1_"/>
<div class="absolute bottom-0 right-0 bg-green-500 w-5 h-5 rounded-full border-2 border-white dark:border-slate-900 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[10px] font-bold">check</span>
</div>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight">Rate your experience</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">How was your plumbing service with <span class="font-semibold text-slate-700 dark:text-slate-200">David M.</span>?</p>
</div>
</div>
<!-- Rating Stars Section -->
<div class="px-6 py-2 flex flex-col items-center">
<div class="flex items-center justify-center gap-1 sm:gap-2 w-full py-4">
<!-- Star 1 (Active) -->
<button class="group flex flex-col items-center gap-1 focus:outline-none">
<span class="material-symbols-outlined text-[40px] text-primary fill-1 transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 40;">star</span>
<span class="text-xs font-semibold text-primary">Terrible</span>
</button>
<!-- Star 2 (Active) -->
<button class="group flex flex-col items-center gap-1 focus:outline-none">
<span class="material-symbols-outlined text-[40px] text-primary fill-1 transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 40;">star</span>
<span class="text-xs font-semibold text-primary">Bad</span>
</button>
<!-- Star 3 (Active) -->
<button class="group flex flex-col items-center gap-1 focus:outline-none">
<span class="material-symbols-outlined text-[40px] text-primary fill-1 transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 40;">star</span>
<span class="text-xs font-semibold text-primary">Okay</span>
</button>
<!-- Star 4 (Active) -->
<button class="group flex flex-col items-center gap-1 focus:outline-none">
<span class="material-symbols-outlined text-[40px] text-primary fill-1 transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 40;">star</span>
<span class="text-xs font-semibold text-primary">Good</span>
</button>
<!-- Star 5 (Inactive) -->
<button class="group flex flex-col items-center gap-1 focus:outline-none">
<span class="material-symbols-outlined text-[40px] text-slate-300 dark:text-slate-600 transition-transform group-hover:scale-110 group-hover:text-primary/50" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 40;">star</span>
<span class="text-xs font-medium text-slate-400 dark:text-slate-500 group-hover:text-primary/70">Great</span>
</button>
</div>
<div class="h-px w-full bg-slate-100 dark:bg-slate-800 my-2"></div>
</div>
<!-- Review Form -->
<div class="p-6 pt-2">
<label class="block mb-4">
<span class="text-slate-900 dark:text-slate-200 text-sm font-semibold mb-2 block">What did you like or dislike?</span>
<div class="relative">
<textarea class="w-full min-h-[140px] resize-none rounded-xl border border-slate-200 dark:border-slate-700 bg-background-light dark:bg-slate-800/50 p-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none text-base transition-all" placeholder="Share details about your experience with David to help other customers..."></textarea>
<!-- Helper chips -->
<div class="absolute bottom-3 left-3 right-3 flex gap-2 overflow-x-auto no-scrollbar pb-1">
<button class="whitespace-nowrap rounded-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">
                                Punctual
                            </button>
<button class="whitespace-nowrap rounded-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">
                                Professional
                            </button>
<button class="whitespace-nowrap rounded-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 px-3 py-1 text-xs font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">
                                Good Value
                            </button>
</div>
</div>
</label>
<!-- Checkbox for anonymity -->
<div class="flex items-center mb-6">
<input class="w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-slate-800 focus:ring-2 dark:bg-slate-700 dark:border-slate-600" id="anonymous" type="checkbox"/>
<label class="ml-2 text-sm font-medium text-slate-600 dark:text-slate-400" for="anonymous">Post review anonymously</label>
</div>
<!-- Actions -->
<div class="flex gap-3">
<button class="flex-1 py-3 px-5 bg-primary hover:bg-blue-700 text-white font-bold rounded-xl transition-colors shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2 group">
<span>Submit Review</span>
<span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
<div class="mt-4 text-center">
<button class="text-sm font-semibold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">Maybe Later</button>
</div>
</div>
</div>
</div>
</body></html>
